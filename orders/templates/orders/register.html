{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sign Up - www.getautoparts.shop{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#ff6f00;
    --primary-dark:#e55100;
    --bg:#0f1419;
    --text:#ffffff;
    --card:#ffffff;
}

/* ========== GLOBAL (MOBILE FIRST) ========== */
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:Inter,sans-serif;
    background:linear-gradient(135deg,#0f1419,#1a2332);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ========== NAVBAR ========== */
.navbar{
    padding:.6rem 1rem;
    background:rgba(15,20,25,.95);
    backdrop-filter:blur(10px);
}

.navbar-brand{
    font-size:clamp(1rem,4vw,1.3rem);
    font-weight:800;
    color:#fff !important;
}

/* ========== MAIN ========== */
main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:1rem;
}

/* ========== CARD (MOBILE FIRST) ========== */
.auth-container{
    width:100%;
    max-width:420px;
}

.auth-card{
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* HEADER */
.auth-header{
    background:linear-gradient(135deg,var(--primary),#ff8c00);
    color:#fff;
    text-align:center;
    padding:1.5rem 1rem;
}

.auth-header i{
    font-size:2rem;
    margin-bottom:.5rem;
}

.auth-header h2{
    font-size:clamp(1.2rem,5vw,1.6rem);
    font-weight:700;
}

.auth-header p{
    font-size:.9rem;
    opacity:.9;
}

/* BODY */
.auth-body{
    padding:1.2rem;
}

/* FORM */
.form-group{
    margin-bottom:1rem;
}

.form-label{
    font-weight:600;
    font-size:.9rem;
}

.form-control,.form-select{
    width:100%;
    padding:.75rem;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px; /* prevents zoom on mobile */
}

/* BUTTON */
.btn-auth{
    width:100%;
    padding:.8rem;
    border:none;
    border-radius:10px;
    font-weight:700;
    background:linear-gradient(135deg,var(--primary),#ff8c00);
    color:#fff;
    margin-top:.5rem;
}

/* FOOTER */
.auth-footer{
    text-align:center;
    padding:1rem;
    font-size:.9rem;
    background:#fafafa;
}

/* ========== TABLET ========== */
@media(min-width:768px){
    .auth-container{
        max-width:450px;
    }

    .auth-body{
        padding:2rem;
    }

    .auth-header{
        padding:2rem;
    }
}

/* ========== DESKTOP ========== */
@media(min-width:992px){
    .auth-container{
        max-width:500px;
    }
}

/* reduce motion */
@media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important;}
}
</style>
</head>

<body>

<nav class="navbar">
    <a class="navbar-brand" href="{% url 'home' %}">
        <i class="fas fa-cogs"></i> getautoparts.shop
    </a>
</nav>

<main>
    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Join our auto parts marketplace</p>
            </div>

            <div class="auth-body">

                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="form-group">

                            <label class="form-label">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div style="color:red;font-size:.8rem;margin-top:.3rem;">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>
                    {% endfor %}

                    <button class="btn-auth">
                        Create Account
                    </button>
                </form>

            </div>

            <div class="auth-footer">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
